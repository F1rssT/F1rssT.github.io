```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animated GitHub Page</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        background: linear-gradient(135deg, #111, #222);
        font-family: Arial, sans-serif;
        overflow: hidden;
        color: white;
    }

    h1 {
        margin-bottom: 20px;
        animation: fadeIn 2s ease;
    }

    #box {
        width: 150px;
        height: 150px;
        background: linear-gradient(45deg, #ff0066, #00ccff);
        border-radius: 20px;
        transition: 0.6s;
        cursor: pointer;
        box-shadow: 0 0 25px rgba(0,0,0,0.5);
    }

    #box:hover {
        transform: scale(1.1) rotate(5deg);
        box-shadow: 0 0 40px #00ccff;
    }

    .animate {
        animation: spinJump 1s ease;
    }

    button {
        margin-top: 30px;
        padding: 12px 24px;
        border: none;
        border-radius: 10px;
        background: #00ccff;
        color: white;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff0066;
        transform: scale(1.05);
    }

    @keyframes spinJump {
        0% {
            transform: rotate(0deg) translateY(0);
        }

        50% {
            transform: rotate(180deg) translateY(-40px);
        }

        100% {
            transform: rotate(360deg) translateY(0);
        }
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
</head>

<body>

<h1>GitHub Animated Page</h1>

<div id="box"></div>

<button onclick="playAnimation()">
    Запустить анимацию
</button>

<script>
function playAnimation() {
    const box = document.getElementById("box");

    box.classList.remove("animate");

    void box.offsetWidth;

    box.classList.add("animate");
}
</script>

</body>
</html>
```
